<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="240" viewBox="0 0 1200 240" role="img" aria-labelledby="title desc">
  <title id="title">Mirochill — Building useful things, clearly.</title>
  <desc id="desc">A minimal light profile banner for Mirochill, focused on tools, automation, and experiments.</desc>
  <defs>
    <linearGradient id="accent" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#7c3aed"/>
      <stop offset="52%" stop-color="#0284c7"/>
      <stop offset="100%" stop-color="#059669"/>
    </linearGradient>
    <radialGradient id="glowLeft" cx="0" cy="0" r="1" gradientTransform="translate(165 28) rotate(29) scale(410 250)">
      <stop offset="0%" stop-color="#c4b5fd" stop-opacity="0.42"/>
      <stop offset="100%" stop-color="#c4b5fd" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="glowRight" cx="0" cy="0" r="1" gradientTransform="translate(1050 220) rotate(205) scale(430 260)">
      <stop offset="0%" stop-color="#7dd3fc" stop-opacity="0.38"/>
      <stop offset="100%" stop-color="#7dd3fc" stop-opacity="0"/>
    </radialGradient>
    <pattern id="grid" width="32" height="32" patternUnits="userSpaceOnUse">
      <path d="M 32 0 L 0 0 0 32" fill="none" stroke="#57606a" stroke-opacity="0.07" stroke-width="1"/>
    </pattern>
  </defs>

  <rect x="1" y="1" width="1198" height="238" rx="22" fill="#ffffff" stroke="#d0d7de"/>
  <rect x="1" y="1" width="1198" height="238" rx="22" fill="url(#grid)"/>
  <rect x="1" y="1" width="1198" height="238" rx="22" fill="url(#glowLeft)"/>
  <rect x="1" y="1" width="1198" height="238" rx="22" fill="url(#glowRight)"/>

  <g opacity="0.86">
    <circle cx="72" cy="56" r="3" fill="#7c3aed"/>
    <circle cx="91" cy="56" r="3" fill="#0284c7"/>
    <circle cx="110" cy="56" r="3" fill="#059669"/>
  </g>

  <g transform="translate(462 32)">
    <rect width="276" height="30" rx="15" fill="#f6f8fa" stroke="#d0d7de"/>
    <circle cx="18" cy="15" r="4" fill="url(#accent)"/>
    <text x="32" y="20" fill="#57606a" font-family="ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, monospace" font-size="12" letter-spacing="1.6">MIROCHILL · DEVELOPER</text>
  </g>

  <text x="600" y="126" text-anchor="middle" fill="#24292f" font-family="ui-sans-serif, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="43" font-weight="700" letter-spacing="-1.4">Building useful things, clearly.</text>
  <text x="600" y="164" text-anchor="middle" fill="#57606a" font-family="ui-sans-serif, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="17" letter-spacing="0.7">tools  ·  automation  ·  focused experiments</text>
  <rect x="518" y="194" width="164" height="3" rx="1.5" fill="url(#accent)"/>
</svg>
