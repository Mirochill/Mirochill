<svg xmlns="http://www.w3.org/2000/svg" width="960" height="220" viewBox="0 0 960 220" role="img" aria-labelledby="title desc">
  <title id="title">Mirochill profile header</title>
  <desc id="desc">Compact animated light banner for Mirochill, focused on ideas, interfaces and AI-powered creation.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#FFFFFF"/>
      <stop offset="0.56" stop-color="#F8FAFF"/>
      <stop offset="1" stop-color="#EEF4FF"/>
    </linearGradient>
    <linearGradient id="accent" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#7C3AED"/>
      <stop offset="0.48" stop-color="#2563EB"/>
      <stop offset="1" stop-color="#0891B2"/>
    </linearGradient>
    <radialGradient id="orb" cx="35%" cy="30%" r="70%">
      <stop offset="0" stop-color="#FFFFFF"/>
      <stop offset="0.22" stop-color="#A78BFA"/>
      <stop offset="0.62" stop-color="#3B82F6"/>
      <stop offset="1" stop-color="#06B6D4"/>
    </radialGradient>
    <filter id="glow" x="-100%" y="-100%" width="300%" height="300%">
      <feGaussianBlur stdDeviation="7" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <clipPath id="clip"><rect x="1" y="1" width="958" height="218" rx="24"/></clipPath>
  </defs>

  <style>
    .star { animation: twinkle 3.4s ease-in-out infinite; transform-origin: center; }
    .star.s2 { animation-delay: .8s; }
    .star.s3 { animation-delay: 1.7s; }
    .pulse { animation: pulse 4s ease-in-out infinite; transform-origin: 800px 110px; }
    .orbit { animation: rotate 14s linear infinite; transform-origin: 800px 110px; }
    .orbit.reverse { animation-direction: reverse; animation-duration: 19s; }
    @keyframes twinkle { 0%,100% { opacity:.18; transform:scale(.75) } 50% { opacity:.85; transform:scale(1.15) } }
    @keyframes pulse { 0%,100% { opacity:.7; transform:scale(.96) } 50% { opacity:1; transform:scale(1.05) } }
    @keyframes rotate { to { transform:rotate(360deg) } }
    @media (prefers-reduced-motion: reduce) { .star,.pulse,.orbit { animation:none } }
  </style>

  <g clip-path="url(#clip)">
    <rect width="960" height="220" fill="url(#bg)"/>
    <circle cx="58" cy="210" r="150" fill="#4F46E5" opacity=".055"/>
    <circle cx="545" cy="-60" r="190" fill="#0EA5E9" opacity=".05"/>
    <path d="M0 185 C180 151 315 216 486 176 C660 136 785 174 960 145" fill="none" stroke="#6366F1" stroke-opacity=".13" stroke-width="1.5"/>
    <path d="M0 202 C180 168 325 233 500 193 C675 153 795 188 960 162" fill="none" stroke="#0891B2" stroke-opacity=".09"/>

    <g fill="#7C3AED">
      <circle class="star" cx="65" cy="34" r="2"/>
      <circle class="star s2" cx="565" cy="43" r="2.5"/>
      <circle class="star s3" cx="685" cy="184" r="2"/>
      <circle class="star s2" cx="910" cy="38" r="1.7"/>
    </g>

    <rect x="34" y="20" width="205" height="28" rx="14" fill="#F8FAFC" stroke="#CBD5E1"/>
    <circle cx="51" cy="34" r="4" fill="#0891B2"/>
    <text x="64" y="39" fill="#64748B" font-family="ui-monospace, SFMono-Regular, Menlo, Consolas, monospace" font-size="12" letter-spacing="1.2">MIROCHILL / PROFILE</text>

    <text x="36" y="105" fill="#0F172A" font-family="Inter, ui-sans-serif, system-ui, -apple-system, Segoe UI, sans-serif" font-size="54" font-weight="800" letter-spacing="3">MIROCHILL</text>
    <rect x="36" y="116" width="430" height="4" rx="2" fill="url(#accent)"/>
    <text x="36" y="151" fill="#334155" font-family="Inter, ui-sans-serif, system-ui, -apple-system, Segoe UI, sans-serif" font-size="19" font-weight="500">Ideas, interfaces &amp; AI-powered creation</text>
    <text x="36" y="177" fill="#64748B" font-family="Inter, ui-sans-serif, system-ui, -apple-system, Segoe UI, sans-serif" font-size="13.5">Turning ambitious concepts into clear, memorable experiences.</text>

    <g font-family="ui-monospace, SFMono-Regular, Menlo, Consolas, monospace" font-size="10" font-weight="700" letter-spacing=".7">
      <rect x="36" y="187" width="120" height="24" rx="12" fill="#F3E8FF" stroke="#C4B5FD"/>
      <text x="51" y="203" fill="#6D28D9">PRODUCT VISION</text>
      <rect x="166" y="187" width="125" height="24" rx="12" fill="#DBEAFE" stroke="#93C5FD"/>
      <text x="181" y="203" fill="#1D4ED8">UX DIRECTION</text>
      <rect x="301" y="187" width="134" height="24" rx="12" fill="#CFFAFE" stroke="#67E8F9"/>
      <text x="316" y="203" fill="#0E7490">AI EXPERIMENTS</text>
    </g>

    <g class="pulse">
      <circle cx="800" cy="110" r="62" fill="#60A5FA" opacity=".14" filter="url(#glow)"/>
      <circle cx="800" cy="110" r="43" fill="url(#orb)"/>
      <circle cx="788" cy="97" r="11" fill="#FFFFFF" opacity=".32"/>
    </g>

    <g class="orbit">
      <ellipse cx="800" cy="110" rx="102" ry="39" fill="none" stroke="#6366F1" stroke-opacity=".5" stroke-width="1.5"/>
      <circle cx="902" cy="110" r="5" fill="#7C3AED" filter="url(#glow)"/>
    </g>
    <g class="orbit reverse">
      <ellipse cx="800" cy="110" rx="72" ry="91" fill="none" stroke="#0891B2" stroke-opacity=".3" transform="rotate(62 800 110)"/>
      <circle cx="800" cy="19" r="3.5" fill="#0891B2" filter="url(#glow)"/>
    </g>

    <path d="M742 66 L730 66 L730 78" fill="none" stroke="#94A3B8" stroke-width="1.5"/>
    <path d="M858 154 L870 154 L870 142" fill="none" stroke="#94A3B8" stroke-width="1.5"/>
  </g>
  <rect x="1" y="1" width="958" height="218" rx="24" fill="none" stroke="#CBD5E1" stroke-width="2"/>
</svg>