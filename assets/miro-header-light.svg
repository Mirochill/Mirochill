<svg xmlns="http://www.w3.org/2000/svg" width="960" height="280" viewBox="0 0 960 280" role="img" aria-labelledby="title desc">
  <title id="title">Mirochill profile header</title>
  <desc id="desc">Animated light banner for Mirochill, focused on ideas, interfaces and AI-powered creation.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#FFFFFF"/>
      <stop offset="0.56" stop-color="#F8FAFF"/>
      <stop offset="1" stop-color="#EEF4FF"/>
    </linearGradient>
    <linearGradient id="accent" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#7C3AED"/>
      <stop offset="0.48" stop-color="#2563EB"/>
      <stop offset="1" stop-color="#0891B2"/>
    </linearGradient>
    <radialGradient id="orb" cx="35%" cy="30%" r="70%">
      <stop offset="0" stop-color="#FFFFFF"/>
      <stop offset="0.22" stop-color="#A78BFA"/>
      <stop offset="0.62" stop-color="#3B82F6"/>
      <stop offset="1" stop-color="#06B6D4"/>
    </radialGradient>
    <filter id="glow" x="-100%" y="-100%" width="300%" height="300%">
      <feGaussianBlur stdDeviation="8" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <clipPath id="clip"><rect x="1" y="1" width="958" height="278" rx="24"/></clipPath>
  </defs>

  <style>
    .star { animation: twinkle 3.4s ease-in-out infinite; transform-origin: center; }
    .star.s2 { animation-delay: .8s; }
    .star.s3 { animation-delay: 1.7s; }
    .pulse { animation: pulse 4s ease-in-out infinite; transform-origin: 790px 140px; }
    .orbit { animation: rotate 14s linear infinite; transform-origin: 790px 140px; }
    .orbit.reverse { animation-direction: reverse; animation-duration: 19s; }
    @keyframes twinkle { 0%,100% { opacity:.18; transform:scale(.75) } 50% { opacity:.85; transform:scale(1.15) } }
    @keyframes pulse { 0%,100% { opacity:.7; transform:scale(.96) } 50% { opacity:1; transform:scale(1.05) } }
    @keyframes rotate { to { transform:rotate(360deg) } }
    @media (prefers-reduced-motion: reduce) { .star,.pulse,.orbit { animation:none } }
  </style>

  <g clip-path="url(#clip)">
    <rect width="960" height="280" fill="url(#bg)"/>
    <circle cx="60" cy="250" r="170" fill="#4F46E5" opacity=".055"/>
    <circle cx="550" cy="-40" r="210" fill="#0EA5E9" opacity=".05"/>
    <path d="M0 236 C180 198 315 276 486 226 C660 175 785 222 960 184" fill="none" stroke="#6366F1" stroke-opacity=".13" stroke-width="1.5"/>
    <path d="M0 254 C180 216 325 294 500 244 C675 194 795 238 960 205" fill="none" stroke="#0891B2" stroke-opacity=".09" stroke-width="1"/>

    <g fill="#7C3AED">
      <circle class="star" cx="65" cy="44" r="2"/>
      <circle class="star s2" cx="565" cy="58" r="2.5"/>
      <circle class="star s3" cx="690" cy="222" r="2"/>
      <circle class="star s2" cx="896" cy="52" r="1.7"/>
    </g>

    <rect x="34" y="30" width="205" height="30" rx="15" fill="#F8FAFC" stroke="#CBD5E1"/>
    <circle cx="51" cy="45" r="4" fill="#0891B2"/>
    <text x="64" y="50" fill="#64748B" font-family="ui-monospace, SFMono-Regular, Menlo, Consolas, monospace" font-size="12" letter-spacing="1.2">MIROCHILL / PROFILE</text>

    <text x="36" y="128" fill="#0F172A" font-family="Inter, ui-sans-serif, system-ui, -apple-system, Segoe UI, sans-serif" font-size="58" font-weight="800" letter-spacing="3">MIROCHILL</text>
    <rect x="36" y="142" width="430" height="4" rx="2" fill="url(#accent)"/>
    <text x="36" y="181" fill="#334155" font-family="Inter, ui-sans-serif, system-ui, -apple-system, Segoe UI, sans-serif" font-size="20" font-weight="500">Ideas, interfaces &amp; AI-powered creation</text>
    <text x="36" y="210" fill="#64748B" font-family="Inter, ui-sans-serif, system-ui, -apple-system, Segoe UI, sans-serif" font-size="14">Turning ambitious concepts into clear, memorable experiences.</text>

    <g font-family="ui-monospace, SFMono-Regular, Menlo, Consolas, monospace" font-size="11" font-weight="700" letter-spacing=".8">
      <rect x="36" y="230" width="128" height="28" rx="14" fill="#F3E8FF" stroke="#C4B5FD"/>
      <text x="53" y="248" fill="#6D28D9">PRODUCT VISION</text>
      <rect x="174" y="230" width="133" height="28" rx="14" fill="#DBEAFE" stroke="#93C5FD"/>
      <text x="191" y="248" fill="#1D4ED8">UX DIRECTION</text>
      <rect x="317" y="230" width="143" height="28" rx="14" fill="#CFFAFE" stroke="#67E8F9"/>
      <text x="334" y="248" fill="#0E7490">AI EXPERIMENTS</text>
    </g>

    <g class="pulse">
      <circle cx="790" cy="140" r="70" fill="#60A5FA" opacity=".14" filter="url(#glow)"/>
      <circle cx="790" cy="140" r="47" fill="url(#orb)"/>
      <circle cx="777" cy="125" r="12" fill="#FFFFFF" opacity=".32"/>
    </g>

    <g class="orbit">
      <ellipse cx="790" cy="140" rx="104" ry="43" fill="none" stroke="#6366F1" stroke-opacity=".5" stroke-width="1.5"/>
      <circle cx="894" cy="140" r="5" fill="#7C3AED" filter="url(#glow)"/>
    </g>
    <g class="orbit reverse">
      <ellipse cx="790" cy="140" rx="83" ry="112" fill="none" stroke="#0891B2" stroke-opacity=".3" stroke-width="1" transform="rotate(62 790 140)"/>
      <circle cx="790" cy="28" r="3.5" fill="#0891B2" filter="url(#glow)"/>
    </g>

    <path d="M730 91 L718 91 L718 103" fill="none" stroke="#94A3B8" stroke-width="1.5"/>
    <path d="M850 189 L862 189 L862 177" fill="none" stroke="#94A3B8" stroke-width="1.5"/>
  </g>
  <rect x="1" y="1" width="958" height="278" rx="24" fill="none" stroke="#CBD5E1" stroke-width="2"/>
</svg>