<svg xmlns="http://www.w3.org/2000/svg" width="960" height="240" viewBox="0 0 960 240" role="img" aria-labelledby="title desc">
  <title id="title">Mirochill creative profile</title>
  <desc id="desc">Animated light banner featuring Mirochill's creative direction, interface design and AI-native prototyping.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#FFFFFF"/>
      <stop offset="0.52" stop-color="#F8FAFF"/>
      <stop offset="1" stop-color="#EEF4FF"/>
    </linearGradient>
    <linearGradient id="brand" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#7C3AED"/>
      <stop offset="0.48" stop-color="#2563EB"/>
      <stop offset="1" stop-color="#0891B2"/>
    </linearGradient>
    <linearGradient id="crystal" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#FFFFFF"/>
      <stop offset="0.25" stop-color="#C4B5FD"/>
      <stop offset="0.58" stop-color="#60A5FA"/>
      <stop offset="1" stop-color="#22D3EE"/>
    </linearGradient>
    <linearGradient id="glass" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#FFFFFF" stop-opacity=".9"/>
      <stop offset="1" stop-color="#FFFFFF" stop-opacity=".52"/>
    </linearGradient>
    <radialGradient id="auraViolet">
      <stop offset="0" stop-color="#8B5CF6" stop-opacity=".2"/>
      <stop offset="1" stop-color="#8B5CF6" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="auraCyan">
      <stop offset="0" stop-color="#06B6D4" stop-opacity=".16"/>
      <stop offset="1" stop-color="#06B6D4" stop-opacity="0"/>
    </radialGradient>
    <filter id="softGlow" x="-100%" y="-100%" width="300%" height="300%"><feGaussianBlur stdDeviation="13"/></filter>
    <filter id="crystalGlow" x="-100%" y="-100%" width="300%" height="300%">
      <feGaussianBlur in="SourceGraphic" stdDeviation="6" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="shadow" x="-40%" y="-40%" width="180%" height="180%">
      <feGaussianBlur in="SourceAlpha" stdDeviation="8" result="shadowBlur"/>
      <feOffset in="shadowBlur" dy="8" result="shadowOffset"/>
      <feFlood flood-color="#64748B" flood-opacity=".2" result="shadowColor"/>
      <feComposite in="shadowColor" in2="shadowOffset" operator="in" result="shadow"/>
      <feMerge><feMergeNode in="shadow"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <pattern id="grid" width="28" height="28" patternUnits="userSpaceOnUse"><path d="M28 0H0V28" fill="none" stroke="#64748B" stroke-opacity=".09" stroke-width="1"/></pattern>
    <clipPath id="clip"><rect x="1" y="1" width="958" height="238" rx="28"/></clipPath>
  </defs>

  <style>
    .spin-slow { transform-box:view-box; transform-origin:780px 120px; animation:spin 22s linear infinite; }
    .spin-fast { transform-box:view-box; transform-origin:780px 120px; animation:spinReverse 13s linear infinite; }
    .float-a { animation:floatA 5.2s ease-in-out infinite; }
    .float-b { animation:floatB 6.1s ease-in-out infinite; }
    .float-c { animation:floatC 5.7s ease-in-out infinite; }
    .pulse { transform-box:view-box; transform-origin:780px 120px; animation:pulse 4.2s ease-in-out infinite; }
    .dash { stroke-dasharray:9 12; animation:dash 8s linear infinite; }
    .trace { stroke-dasharray:44 240; animation:trace 5.6s linear infinite; }
    .spark { animation:twinkle 3.6s ease-in-out infinite; }
    .spark.s2 { animation-delay:.9s; }
    .spark.s3 { animation-delay:1.8s; }
    .sweep { animation:sweep 6.5s ease-in-out infinite; }
    @keyframes spin { to { transform:rotate(360deg); } }
    @keyframes spinReverse { to { transform:rotate(-360deg); } }
    @keyframes floatA { 0%,100% { transform:translateY(0) } 50% { transform:translateY(-6px) } }
    @keyframes floatB { 0%,100% { transform:translateY(0) } 50% { transform:translateY(7px) } }
    @keyframes floatC { 0%,100% { transform:translate(0,0) } 50% { transform:translate(-5px,-4px) } }
    @keyframes pulse { 0%,100% { transform:scale(.96); opacity:.82 } 50% { transform:scale(1.045); opacity:1 } }
    @keyframes dash { to { stroke-dashoffset:-84; } }
    @keyframes trace { to { stroke-dashoffset:-284; } }
    @keyframes twinkle { 0%,100% { opacity:.22 } 50% { opacity:.9 } }
    @keyframes sweep { 0%,16% { transform:translateX(-190px); opacity:0 } 42% { opacity:.34 } 68%,100% { transform:translateX(650px); opacity:0 } }
    @media (prefers-reduced-motion: reduce) { .spin-slow,.spin-fast,.float-a,.float-b,.float-c,.pulse,.dash,.trace,.spark,.sweep { animation:none; } }
  </style>

  <g clip-path="url(#clip)">
    <rect width="960" height="240" fill="url(#bg)"/>
    <ellipse cx="190" cy="258" rx="330" ry="185" fill="url(#auraViolet)" opacity=".72"/>
    <ellipse cx="790" cy="95" rx="255" ry="210" fill="url(#auraCyan)" opacity=".7"/>
    <rect x="520" width="440" height="240" fill="url(#grid)" opacity=".75"/>
    <path d="M0 204C170 172 290 231 456 196C625 160 754 186 960 140" fill="none" stroke="#6366F1" stroke-opacity=".13"/>
    <path d="M0 220C185 186 315 241 478 210C655 176 800 199 960 168" fill="none" stroke="#0891B2" stroke-opacity=".1"/>

    <g class="spark" fill="#7C3AED"><circle cx="66" cy="32" r="2"/><circle cx="506" cy="48" r="2.2"/><circle cx="582" cy="198" r="1.8"/></g>
    <g class="spark s2" fill="#0891B2"><circle cx="552" cy="26" r="1.6"/><circle cx="916" cy="42" r="2"/><circle cx="902" cy="205" r="1.5"/></g>
    <g class="spark s3" fill="#2563EB"><circle cx="449" cy="26" r="1.5"/><circle cx="688" cy="214" r="2"/></g>

    <g>
      <rect x="34" y="24" width="228" height="29" rx="14.5" fill="#FFFFFF" fill-opacity=".82" stroke="#CBD5E1"/>
      <circle cx="52" cy="38.5" r="4" fill="#0891B2"/>
      <text x="65" y="43" fill="#5B21B6" font-family="ui-monospace, SFMono-Regular, Menlo, Consolas, monospace" font-size="11.5" letter-spacing="1.15">MIROCHILL / CREATIVE LAB</text>
    </g>

    <text x="34" y="112" fill="#0F172A" font-family="Inter, ui-sans-serif, system-ui, -apple-system, Segoe UI, sans-serif" font-size="57" font-weight="850" letter-spacing="2.2">MIROCHILL</text>
    <rect x="34" y="124" width="426" height="4" rx="2" fill="url(#brand)"/>
    <rect class="sweep" x="34" y="124" width="120" height="4" rx="2" fill="#FFFFFF" opacity=".5" filter="url(#softGlow)"/>
    <text x="34" y="163" fill="#1E293B" font-family="Inter, ui-sans-serif, system-ui, -apple-system, Segoe UI, sans-serif" font-size="20" font-weight="650">Designing ideas that feel inevitable.</text>
    <text x="34" y="190" fill="#64748B" font-family="Inter, ui-sans-serif, system-ui, -apple-system, Segoe UI, sans-serif" font-size="14">Product direction · interface design · AI-native prototyping</text>

    <g font-family="ui-monospace, SFMono-Regular, Menlo, Consolas, monospace" font-size="10.5" font-weight="700" letter-spacing=".9">
      <rect x="34" y="204" width="112" height="24" rx="12" fill="#F3E8FF" stroke="#C4B5FD"/><text x="51" y="220" fill="#6D28D9">IDEA FIRST</text>
      <rect x="156" y="204" width="126" height="24" rx="12" fill="#DBEAFE" stroke="#93C5FD"/><text x="173" y="220" fill="#1D4ED8">CLEAR SYSTEMS</text>
      <rect x="292" y="204" width="120" height="24" rx="12" fill="#CFFAFE" stroke="#67E8F9"/><text x="309" y="220" fill="#0E7490">BOLD OUTPUT</text>
    </g>

    <g filter="url(#shadow)">
      <rect x="592" y="20" width="340" height="200" rx="28" fill="url(#glass)" stroke="#CBD5E1"/>
      <rect x="604" y="32" width="316" height="176" rx="22" fill="#FFFFFF" fill-opacity=".24" stroke="#FFFFFF" stroke-opacity=".7"/>
    </g>

    <g fill="none" stroke-linecap="round">
      <path class="trace" d="M652 78C694 50 728 60 759 91" stroke="url(#brand)" stroke-width="1.5" opacity=".72"/>
      <path class="trace" d="M805 92C839 58 876 62 896 84" stroke="url(#brand)" stroke-width="1.5" opacity=".72" style="animation-delay:1.4s"/>
      <path class="trace" d="M808 148C844 178 874 181 901 164" stroke="url(#brand)" stroke-width="1.5" opacity=".72" style="animation-delay:2.8s"/>
    </g>

    <g class="spin-slow" fill="none" stroke="url(#brand)">
      <ellipse cx="780" cy="120" rx="102" ry="54" stroke-width="1.2" stroke-opacity=".58"/>
      <circle cx="882" cy="120" r="4.5" fill="#7C3AED" stroke="none" filter="url(#crystalGlow)"/>
    </g>
    <g class="spin-fast" fill="none" stroke="#0891B2">
      <ellipse cx="780" cy="120" rx="70" ry="94" stroke-width="1" stroke-opacity=".34" transform="rotate(57 780 120)"/>
      <circle cx="780" cy="26" r="3.5" fill="#0891B2" stroke="none" filter="url(#crystalGlow)"/>
    </g>
    <circle class="dash" cx="780" cy="120" r="78" fill="none" stroke="#6366F1" stroke-opacity=".23" stroke-width="1"/>

    <g class="pulse" filter="url(#crystalGlow)">
      <circle cx="780" cy="120" r="61" fill="#60A5FA" opacity=".13" filter="url(#softGlow)"/>
      <path d="M780 76L822 99V141L780 164L738 141V99Z" fill="url(#crystal)"/>
      <path d="M780 76L780 120L738 99Z" fill="#FFFFFF" opacity=".34"/>
      <path d="M780 76L822 99L780 120Z" fill="#FFFFFF" opacity=".22"/>
      <path d="M738 99L780 120L738 141Z" fill="#2563EB" opacity=".24"/>
      <path d="M822 99L780 120L822 141Z" fill="#0891B2" opacity=".22"/>
      <path d="M738 141L780 120L780 164Z" fill="#4F46E5" opacity=".24"/>
      <path d="M822 141L780 120L780 164Z" fill="#06B6D4" opacity=".2"/>
      <circle cx="766" cy="103" r="8" fill="#FFFFFF" opacity=".42"/>
    </g>

    <g class="float-a" font-family="ui-monospace, SFMono-Regular, Menlo, Consolas, monospace" filter="url(#shadow)">
      <rect x="612" y="47" width="102" height="42" rx="12" fill="#FFFFFF" fill-opacity=".92" stroke="#A78BFA" stroke-opacity=".55"/>
      <circle cx="630" cy="67" r="4" fill="#7C3AED"/><text x="641" y="71" fill="#5B21B6" font-size="10.5" font-weight="700" letter-spacing="1">IDEA</text>
    </g>
    <g class="float-b" font-family="ui-monospace, SFMono-Regular, Menlo, Consolas, monospace" filter="url(#shadow)">
      <rect x="852" y="58" width="70" height="42" rx="12" fill="#FFFFFF" fill-opacity=".92" stroke="#60A5FA" stroke-opacity=".55"/>
      <circle cx="868" cy="78" r="4" fill="#2563EB"/><text x="879" y="82" fill="#1D4ED8" font-size="10" font-weight="700" letter-spacing=".7">UX</text>
    </g>
    <g class="float-c" font-family="ui-monospace, SFMono-Regular, Menlo, Consolas, monospace" filter="url(#shadow)">
      <rect x="840" y="153" width="82" height="42" rx="12" fill="#FFFFFF" fill-opacity=".92" stroke="#22D3EE" stroke-opacity=".55"/>
      <circle cx="856" cy="173" r="4" fill="#0891B2"/><text x="867" y="177" fill="#0E7490" font-size="9.5" font-weight="700" letter-spacing=".55">BUILD</text>
    </g>
  </g>
  <rect x="1" y="1" width="958" height="238" rx="28" fill="none" stroke="#CBD5E1" stroke-width="2"/>
</svg>
