<svg xmlns="http://www.w3.org/2000/svg" width="960" height="132" viewBox="0 0 960 132" role="img" aria-labelledby="title desc">
  <title id="title">Mirochill creative process</title>
  <desc id="desc">A compact four-step process: frame the idea, direct the experience, build with AI and refine what matters.</desc>
  <defs>
    <linearGradient id="line" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#7C3AED"/><stop offset=".5" stop-color="#2563EB"/><stop offset="1" stop-color="#0891B2"/>
    </linearGradient>
    <filter id="glow" x="-100%" y="-100%" width="300%" height="300%"><feGaussianBlur stdDeviation="4" result="b"/><feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge></filter>
  </defs>
  <style>
    .node { animation: breathe 3.8s ease-in-out infinite; transform-origin:center; }
    .n2 { animation-delay:.55s }.n3 { animation-delay:1.1s }.n4 { animation-delay:1.65s }
    @keyframes breathe { 0%,100% { opacity:.76 } 50% { opacity:1 } }
    @media (prefers-reduced-motion: reduce) { .node { animation:none } }
  </style>

  <rect x="1" y="1" width="958" height="130" rx="18" fill="#FFFFFF" stroke="#CBD5E1" stroke-width="2"/>
  <text x="30" y="23" fill="#64748B" font-family="ui-monospace, SFMono-Regular, Menlo, Consolas, monospace" font-size="10.5" letter-spacing="1.4">MY CREATIVE LOOP</text>
  <path d="M120 51 H840" fill="none" stroke="#E2E8F0" stroke-width="4" stroke-linecap="round"/>
  <path d="M120 51 H840" fill="none" stroke="url(#line)" stroke-width="2" stroke-linecap="round" opacity=".8"/>
  <circle r="5" fill="#FFFFFF" stroke="#6366F1" stroke-width="2" filter="url(#glow)">
    <animateMotion dur="5.5s" repeatCount="indefinite" path="M120 51 H840"/>
  </circle>

  <g class="node">
    <circle cx="120" cy="51" r="16" fill="#F3E8FF" stroke="#A78BFA"/>
    <circle cx="120" cy="51" r="5.5" fill="#7C3AED"/>
    <text x="58" y="87" fill="#0F172A" font-family="Inter, ui-sans-serif, system-ui, sans-serif" font-size="15" font-weight="700">01 · FRAME</text>
    <text x="58" y="108" fill="#64748B" font-family="Inter, ui-sans-serif, system-ui, sans-serif" font-size="12.5">Find the real idea</text>
  </g>
  <g class="node n2">
    <circle cx="360" cy="51" r="16" fill="#E0E7FF" stroke="#818CF8"/>
    <circle cx="360" cy="51" r="5.5" fill="#4F46E5"/>
    <text x="298" y="87" fill="#0F172A" font-family="Inter, ui-sans-serif, system-ui, sans-serif" font-size="15" font-weight="700">02 · DIRECT</text>
    <text x="298" y="108" fill="#64748B" font-family="Inter, ui-sans-serif, system-ui, sans-serif" font-size="12.5">Shape the experience</text>
  </g>
  <g class="node n3">
    <circle cx="600" cy="51" r="16" fill="#DBEAFE" stroke="#60A5FA"/>
    <circle cx="600" cy="51" r="5.5" fill="#2563EB"/>
    <text x="538" y="87" fill="#0F172A" font-family="Inter, ui-sans-serif, system-ui, sans-serif" font-size="15" font-weight="700">03 · BUILD</text>
    <text x="538" y="108" fill="#64748B" font-family="Inter, ui-sans-serif, system-ui, sans-serif" font-size="12.5">Use AI to move fast</text>
  </g>
  <g class="node n4">
    <circle cx="840" cy="51" r="16" fill="#CFFAFE" stroke="#22D3EE"/>
    <circle cx="840" cy="51" r="5.5" fill="#0891B2"/>
    <text x="778" y="87" fill="#0F172A" font-family="Inter, ui-sans-serif, system-ui, sans-serif" font-size="15" font-weight="700">04 · REFINE</text>
    <text x="778" y="108" fill="#64748B" font-family="Inter, ui-sans-serif, system-ui, sans-serif" font-size="12.5">Polish what matters</text>
  </g>
</svg>