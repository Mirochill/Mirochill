<svg xmlns="http://www.w3.org/2000/svg" width="960" height="176" viewBox="0 0 960 176" role="img" aria-labelledby="title desc">
  <title id="title">Mirochill creative process</title>
  <desc id="desc">A four-step process: frame the idea, direct the experience, build with AI and refine what matters.</desc>
  <defs>
    <linearGradient id="line" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#8B5CF6"/><stop offset=".5" stop-color="#3B82F6"/><stop offset="1" stop-color="#22D3EE"/>
    </linearGradient>
    <filter id="glow" x="-100%" y="-100%" width="300%" height="300%"><feGaussianBlur stdDeviation="4" result="b"/><feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge></filter>
  </defs>
  <style>
    .node { animation: breathe 3.8s ease-in-out infinite; transform-origin:center; }
    .n2 { animation-delay:.55s }.n3 { animation-delay:1.1s }.n4 { animation-delay:1.65s }
    @keyframes breathe { 0%,100% { opacity:.72 } 50% { opacity:1 } }
    @media (prefers-reduced-motion: reduce) { .node { animation:none } }
  </style>

  <rect x="1" y="1" width="958" height="174" rx="20" fill="#090D18" stroke="#26324A" stroke-width="2"/>
  <text x="30" y="32" fill="#64748B" font-family="ui-monospace, SFMono-Regular, Menlo, Consolas, monospace" font-size="11" letter-spacing="1.4">MY CREATIVE LOOP</text>
  <path d="M120 72 H840" fill="none" stroke="#24324A" stroke-width="4" stroke-linecap="round"/>
  <path d="M120 72 H840" fill="none" stroke="url(#line)" stroke-width="2" stroke-linecap="round" opacity=".8"/>
  <circle r="5" fill="#E0E7FF" filter="url(#glow)">
    <animateMotion dur="5.5s" repeatCount="indefinite" path="M120 72 H840"/>
  </circle>

  <g class="node">
    <circle cx="120" cy="72" r="18" fill="#7C3AED" fill-opacity=".2" stroke="#8B5CF6"/>
    <circle cx="120" cy="72" r="6" fill="#A78BFA"/>
    <text x="58" y="113" fill="#F8FAFC" font-family="Inter, ui-sans-serif, system-ui, sans-serif" font-size="16" font-weight="700">01 · FRAME</text>
    <text x="58" y="136" fill="#94A3B8" font-family="Inter, ui-sans-serif, system-ui, sans-serif" font-size="13">Find the real idea</text>
  </g>
  <g class="node n2">
    <circle cx="360" cy="72" r="18" fill="#4F46E5" fill-opacity=".2" stroke="#6366F1"/>
    <circle cx="360" cy="72" r="6" fill="#818CF8"/>
    <text x="298" y="113" fill="#F8FAFC" font-family="Inter, ui-sans-serif, system-ui, sans-serif" font-size="16" font-weight="700">02 · DIRECT</text>
    <text x="298" y="136" fill="#94A3B8" font-family="Inter, ui-sans-serif, system-ui, sans-serif" font-size="13">Shape the experience</text>
  </g>
  <g class="node n3">
    <circle cx="600" cy="72" r="18" fill="#2563EB" fill-opacity=".2" stroke="#3B82F6"/>
    <circle cx="600" cy="72" r="6" fill="#60A5FA"/>
    <text x="538" y="113" fill="#F8FAFC" font-family="Inter, ui-sans-serif, system-ui, sans-serif" font-size="16" font-weight="700">03 · BUILD</text>
    <text x="538" y="136" fill="#94A3B8" font-family="Inter, ui-sans-serif, system-ui, sans-serif" font-size="13">Use AI to move fast</text>
  </g>
  <g class="node n4">
    <circle cx="840" cy="72" r="18" fill="#0891B2" fill-opacity=".2" stroke="#22D3EE"/>
    <circle cx="840" cy="72" r="6" fill="#67E8F9"/>
    <text x="778" y="113" fill="#F8FAFC" font-family="Inter, ui-sans-serif, system-ui, sans-serif" font-size="16" font-weight="700">04 · REFINE</text>
    <text x="778" y="136" fill="#94A3B8" font-family="Inter, ui-sans-serif, system-ui, sans-serif" font-size="13">Polish what matters</text>
  </g>
</svg>